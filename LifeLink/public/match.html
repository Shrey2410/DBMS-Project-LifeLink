<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Donors - LifeLink</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo">LifeLink ❤️</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="donors.html">Donors</a></li>
            <li><a href="patients.html">Patients</a></li>
            <li><a href="match.html" class="active">Match Donors</a></li>
            <li><a href="inventory.html">Inventory</a></li>
        </ul>
    </nav>
    <div class="container">
        <h2>Find Matching Donors</h2>
        <div class="form-card">
            <form id="matchForm">
                <div class="form-group">
                    <label>Enter Patient ID</label>
                    <input type="number" id="patientId" name="patient_id" required placeholder="e.g. 1">
                </div>
                <button type="submit" class="btn primary">Find Matches</button>
            </form>
        </div>

        <h2>Match Results</h2>
        <table id="matchTable">
            <thead>
                <tr>
                    <th>Donor ID</th>
                    <th>Name</th>
                    <th>Blood Group</th>
                    <th>Resource Type</th>
                    <th>City</th>
                    <th>Phone</th>
                </tr>
            </thead>
            <tbody>
                <!-- Populated by JS -->
            </tbody>
        </table>
    </div>
    <script src="app.js"></script>
</body>
</html>
