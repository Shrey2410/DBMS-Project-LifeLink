<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donors - LifeLink</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo">LifeLink ❤️</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="donors.html" class="active">Donors</a></li>
            <li><a href="patients.html">Patients</a></li>
            <li><a href="match.html">Match Donors</a></li>
            <li><a href="inventory.html">Inventory</a></li>
        </ul>
    </nav>
    <div class="container">
        <h2>Register as a Donor</h2>
        <div class="form-card">
            <form id="donorForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" required>
                </div>
                <div class="form-group">
                    <label>Blood Group</label>
                    <select name="blood_group" required>
                        <option value="A+">A+</option><option value="A-">A-</option>
                        <option value="B+">B+</option><option value="B-">B-</option>
                        <option value="O+">O+</option><option value="O-">O-</option>
                        <option value="AB+">AB+</option><option value="AB-">AB-</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>HLA Type (Optional - for bone marrow)</label>
                    <input type="text" name="hla_type">
                </div>
                <div class="form-group">
                    <label>City</label>
                    <input type="text" name="city" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" name="phone" required>
                </div>
                <div class="form-group">
                    <label>Resources Willing to Donate (Hold Ctrl/Cmd to select multiple)</label>
                    <select id="resources" name="resources" multiple required style="height: 100px;">
                        <option value="blood">Blood</option>
                        <option value="platelets">Platelets</option>
                        <option value="plasma">Plasma</option>
                        <option value="bone_marrow">Bone Marrow</option>
                    </select>
                </div>
                <button type="submit" class="btn primary">Register Donor</button>
            </form>
        </div>

        <h2>Donor Directory</h2>
        <table id="donorsTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Blood Group</th>
                    <th>City</th>
                    <th>Phone</th>
                    <th>Available</th>
                </tr>
            </thead>
            <tbody>
                <!-- Populated by JS -->
            </tbody>
        </table>
    </div>
    <script src="app.js"></script>
</body>
</html>
